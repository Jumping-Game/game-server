name: Build and publish Docker image

on:
  push:
    branches:
      - trunk
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    env:
      PUSH_IMAGE: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
      IMAGE_NAME: ${{ github.event.repository.name }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure GHCR package is public
        if: env.PUSH_IMAGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          if gh api "orgs/${OWNER}" > /dev/null 2>&1; then
            scope="orgs/${OWNER}"
          else
            scope="users/${OWNER}"
          fi
          gh api \
            --method PATCH \
            "${scope}/packages/container/${PACKAGE_NAME}/visibility" \
            -f visibility=public \
            || echo "Package visibility update skipped (package may already be public)."
